<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f0f4f8;
        }
        h1 {
            color: #2d6a4f;
            text-align: center;
        }
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
        button {
            padding: 10px 20px;
            background-color: #2d6a4f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background-color: #1b4332; }
        ul { list-style: none; padding: 0; }
        li {
            background: white;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        a {
            color: #dc2626;
            text-decoration: none;
            font-size: 13px;
        }
        a:hover { text-decoration: underline; }
        .empty {
            text-align: center;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>🐳 Docker Todo App</h1>

    <form action="/add" method="POST">
        <input type="text" name="todo" placeholder="Add a new todo..." required>
        <button type="submit">Add</button>
    </form>

    {% if todos %}
        <ul>
            {% for todo in todos %}
            <li>
                <span>{{ todo.text }}</span>
                <a href="/delete/{{ todo._id }}">Delete</a>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="empty">No todos yet! Add one above. 🎯</p>
    {% endif %}

</body>
</html>
